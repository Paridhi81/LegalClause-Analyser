version: "3.9"
services:
  frontend:
    image: nginx:alpine
    ports: ["5500:80"]
    volumes: ["./frontend:/usr/share/nginx/html:ro"]
    depends_on: [backend]

  backend:
    build: ./backend
    ports: ["8000:8000"]
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/lexisai
    depends_on: [db]
    volumes: ["./backend:/app"]
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    ports: ["5432:5432"]
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=lexisai
    volumes: [pgdata:/var/lib/postgresql/data]

volumes:
  pgdata:
